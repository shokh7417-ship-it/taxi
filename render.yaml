# Render Blueprint: single instance to avoid Telegram getUpdates conflict
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: taxi-service
    env: docker
    # Critical: only 1 instance — Telegram allows one getUpdates connection per bot
    numInstances: 1
    envVars:
      - key: RIDER_BOT_TOKEN
        sync: false
      - key: DRIVER_BOT_TOKEN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false

  # Wake free-tier web service on a interval. Uses Python urllib (no curl); produces ~no stdout (avoids "Output too large").
  # Must match your web service’s public URL (Dashboard → service → URL), not necessarily the `name:` field above.
  # Cron jobs may require a paid Render plan — if so, use an external pinger with the curl one-liner in README instead.
  - type: cron
    name: taxi-service-keepalive
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: python -c "import urllib.request as u; r=u.urlopen('https://taxi-1-kpkh.onrender.com/health'); assert r.getcode()==200"
